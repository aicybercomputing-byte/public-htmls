<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-X Events</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Open Sans", Helvetica, Arial, sans-serif;
    color: #1c1c1c;
    width: 100%;
    -webkit-font-smoothing: antialiased;
    background: #f6f6f3;
  }
  .aix-page {
    min-height: 100vh;
    padding: 40px 20px 64px;
  }
  .aix-wrap {
    max-width: 880px;
    margin: 0 auto;
  }
  .aix-muted {
    padding: 24px 0;
    font-size: 14px;
    color: #7E96A0;
  }
  .aix-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .aix-card-button {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: 100%;
    text-align: left;
    cursor: pointer;
    border: 1px solid #e3e3e0;
    border-left: 4px solid #006747;
    background: #fff;
    padding: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    transition: box-shadow .14s ease, transform .14s ease;
    font: inherit;
  }
  .aix-card-button:hover,
  .aix-card-button:focus-visible {
    box-shadow: 0 4px 14px rgba(0,0,0,.10);
    transform: translateY(-1px);
    outline: 2px solid #009374;
    outline-offset: 2px;
  }
  .aix-date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 0 0 84px;
    background: #f7f7f4;
    border-right: 1px solid #ecece8;
    padding: 14px 8px;
  }
  .aix-day {
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
    color: #006747;
  }
  .aix-month-year {
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-size: 12px;
    color: #7E96A0;
    margin-top: 3px;
    white-space: nowrap;
  }
  .aix-card-body {
    flex: 1 1 auto;
    min-width: 0;
    padding: 16px 20px;
  }
  .aix-speaker {
    display: block;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-size: 11px;
    color: #009374;
    margin-bottom: 4px;
  }
  .aix-title {
    display: block;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.18;
    color: #1c1c1c;
    margin-bottom: 7px;
    text-wrap: balance;
  }
  .aix-excerpt {
    display: block;
    font-size: 13.5px;
    line-height: 1.55;
    color: #5a5a5a;
  }
  .aix-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 0;
    margin: 0 0 20px;
    cursor: pointer;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-size: 13px;
    color: #006747;
  }
  .aix-back:hover,
  .aix-back:focus-visible {
    color: #009374;
    outline: 2px solid #009374;
    outline-offset: 2px;
  }
  .aix-detail-card {
    background: #fff;
    border: 1px solid #e3e3e0;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    padding: 36px 40px 44px;
  }
  .aix-detail-speaker {
    margin: 0 0 8px;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-size: 13px;
    color: #009374;
  }
  .aix-detail-title {
    margin: 0 0 16px;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 700;
    font-size: 34px;
    line-height: 1.1;
    color: #1c1c1c;
    text-wrap: balance;
  }
  .aix-detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    padding: 0 0 18px;
    margin: 0 0 24px;
    border-bottom: 2px solid #006747;
  }
  .aix-meta-date {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    color: #444;
  }
  .aix-meta-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #cfc493;
    flex: none;
  }
  .aix-para {
    margin: 0 0 16px;
    font-size: 16px;
    line-height: 1.7;
    color: #333;
  }
  .aix-bio {
    margin-top: 26px;
    background: #f7f7f4;
    border-left: 4px solid #006747;
    padding: 18px 22px;
  }
  .aix-bio-heading {
    margin: 0 0 8px;
    font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    font-size: 13px;
    color: #006747;
  }
  .aix-bio-text {
    margin: 0;
    font-size: 14.5px;
    line-height: 1.65;
    color: #444;
  }
  [hidden] { display: none !important; }
  @media (max-width: 640px) {
    .aix-page { padding: 24px 14px 44px; }
    .aix-date-block { flex-basis: 72px; }
    .aix-card-body { padding: 14px 16px; }
    .aix-detail-card { padding: 28px 22px 34px; }
    .aix-detail-title { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="aix-page">
  <main class="aix-wrap" id="aix-root">
    <section id="aix-list-view" aria-label="AI-X Events">
      <div id="aix-status" class="aix-muted">Loading events&hellip;</div>
      <ul id="aix-list" class="aix-list" role="list" hidden></ul>
    </section>

    <section id="aix-detail-view" hidden>
      <button type="button" id="aix-back" class="aix-back"><span aria-hidden="true">&larr;</span> All events</button>
      <article class="aix-detail-card" id="aix-detail-card"></article>
    </section>
  </main>
</div>

<script>
(function () {
  "use strict";

  var DEFAULT_CSV_URL = "/ai-cybersecurity-computing/centers/ai-x/about/ai-x-events.csv";
  var FALLBACK_CSV_URL = "ai-x-events.csv";
  var DEFAULT_YEAR = 2026;

  var MONTHS = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
  var MONTH_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  var listView = document.getElementById("aix-list-view");
  var detailView = document.getElementById("aix-detail-view");
  var listEl = document.getElementById("aix-list");
  var statusEl = document.getElementById("aix-status");
  var detailCard = document.getElementById("aix-detail-card");
  var backButton = document.getElementById("aix-back");
  var events = [];

  function getConfig() {
    var params = new URLSearchParams(window.location.search || "");
    return {
      csvUrl: params.get("csv") || DEFAULT_CSV_URL,
      fallbackCsvUrl: params.get("fallback") || FALLBACK_CSV_URL,
      year: parseInt(params.get("year") || String(DEFAULT_YEAR), 10) || DEFAULT_YEAR
    };
  }

  function fetchText(url) {
    return fetch(url, { cache: "no-store", credentials: "same-origin" }).then(function (response) {
      if (!response.ok) throw new Error("HTTP " + response.status + " for " + url);
      return response.text();
    });
  }

  function maybeDecodeBase64(text) {
    if (/speaker\s*name/i.test(text.slice(0, 400))) return text;
    try {
      return decodeURIComponent(escape(atob(text.replace(/\s+/g, ""))));
    } catch (err) {
      try {
        return atob(text.replace(/\s+/g, ""));
      } catch (err2) {
        return text;
      }
    }
  }

  function parseCSV(text) {
    var rows = [];
    var field = "";
    var row = [];
    var inQuotes = false;
    text = String(text || "").replace(/^\uFEFF/, "");

    for (var i = 0; i < text.length; i++) {
      var c = text[i];
      if (inQuotes) {
        if (c === "\"") {
          if (text[i + 1] === "\"") {
            field += "\"";
            i++;
          } else {
            inQuotes = false;
          }
        } else {
          field += c;
        }
      } else if (c === "\"") {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field);
        field = "";
      } else if (c === "\r") {
        continue;
      } else if (c === "\n") {
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
      } else {
        field += c;
      }
    }

    if (field.length || row.length) {
      row.push(field);
      rows.push(row);
    }

    return rows;
  }

  function clean(value) {
    return value == null ? "" : String(value).replace(/\uFFFD/g, "\u2014").trim();
  }

  function parseDate(value, fallbackYear) {
    var s = clean(value);
    var match;
    var dayNum = null;
    var monthText = null;
    var year = fallbackYear || DEFAULT_YEAR;

    match = s.match(/^(\d{1,2})(?:st|nd|rd|th)?\s*[-\/ ]\s*([A-Za-z]{3,})(?:,?\s*(\d{4}))?/i);
    if (match) {
      dayNum = parseInt(match[1], 10);
      monthText = match[2];
      if (match[3]) year = parseInt(match[3], 10);
    } else {
      match = s.match(/^([A-Za-z]{3,})\s+(\d{1,2})(?:st|nd|rd|th)?(?:,?\s*(\d{4}))?/i);
      if (!match) return null;
      monthText = match[1];
      dayNum = parseInt(match[2], 10);
      if (match[3]) year = parseInt(match[3], 10);
    }

    var monthIndex = MONTHS[monthText.slice(0, 3).toLowerCase()];
    if (monthIndex == null || !dayNum || dayNum < 1 || dayNum > 31) return null;

    return {
      day: String(dayNum).padStart(2, "0"),
      mon: monthText.slice(0, 3),
      year: String(year),
      dateLabel: MONTH_FULL[monthIndex] + " " + dayNum + ", " + year,
      sortKey: new Date(year, monthIndex, dayNum).getTime()
    };
  }

  function parseEvents(text, fallbackYear) {
    var rows = parseCSV(text);
    if (!rows.length) return [];

    var body = rows.slice(1);
    var out = [];

    body.forEach(function (cols, index) {
      var date = clean(cols[0]);
      var speaker = clean(cols[1]);
      var title = clean(cols[2]);
      var description = clean(cols[3]);
      var bio = clean(cols[4]);
      var parsedDate;

      if (!date || !speaker || !description) return;
      parsedDate = parseDate(date, fallbackYear);
      if (!parsedDate) return;

      out.push({
        id: index,
        speaker: speaker,
        title: title,
        description: description,
        bio: bio,
        day: parsedDate.day,
        mon: parsedDate.mon,
        year: parsedDate.year,
        dateLabel: parsedDate.dateLabel,
        sortKey: parsedDate.sortKey
      });
    });

    out.sort(function (a, b) { return a.sortKey - b.sortKey; });
    return out;
  }

  function excerpt(description) {
    var flat = clean(description).replace(/\s+/g, " ");
    var cut;
    var spaceIndex;

    if (flat.length <= 175) return flat;
    cut = flat.slice(0, 175);
    spaceIndex = cut.lastIndexOf(" ");
    return (spaceIndex > 120 ? cut.slice(0, spaceIndex) : cut).trim() + "\u2026";
  }

  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function textEl(tag, className, text) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    el.textContent = text;
    return el;
  }

  function renderList() {
    clearChildren(listEl);

    if (!events.length) {
      listEl.hidden = true;
      statusEl.hidden = false;
      statusEl.textContent = "No events to display.";
      return;
    }

    events.forEach(function (eventItem) {
      var li = document.createElement("li");
      var button = document.createElement("button");
      var dateBlock = document.createElement("span");
      var body = document.createElement("span");
      var displaySpeaker = eventItem.title ? eventItem.speaker : "Guest Speaker";
      var displayTitle = eventItem.title || eventItem.speaker;

      button.type = "button";
      button.className = "aix-card-button";
      button.addEventListener("click", function () { showDetail(eventItem.id); });

      dateBlock.className = "aix-date-block";
      dateBlock.appendChild(textEl("span", "aix-day", eventItem.day));
      dateBlock.appendChild(textEl("span", "aix-month-year", eventItem.mon + " '" + eventItem.year.slice(2)));

      body.className = "aix-card-body";
      body.appendChild(textEl("span", "aix-speaker", displaySpeaker));
      body.appendChild(textEl("span", "aix-title", displayTitle));
      body.appendChild(textEl("span", "aix-excerpt", excerpt(eventItem.description)));

      button.appendChild(dateBlock);
      button.appendChild(body);
      li.appendChild(button);
      listEl.appendChild(li);
    });

    statusEl.hidden = true;
    listEl.hidden = false;
  }

  function showList() {
    detailView.hidden = true;
    listView.hidden = false;
    window.scrollTo(0, 0);
  }

  function showDetail(id) {
    var selected = events.find(function (item) { return item.id === id; });
    var speakerLine;
    var titleLine;
    var meta;
    var dot;
    var paragraphs;

    if (!selected) return;

    clearChildren(detailCard);

    speakerLine = selected.title ? selected.speaker : "Guest Speaker";
    titleLine = selected.title || selected.speaker;

    detailCard.appendChild(textEl("p", "aix-detail-speaker", speakerLine));
    detailCard.appendChild(textEl("h2", "aix-detail-title", titleLine));

    meta = document.createElement("div");
    meta.className = "aix-detail-meta";
    dot = document.createElement("span");
    dot.className = "aix-meta-dot";
    dot.setAttribute("aria-hidden", "true");
    var dateSpan = textEl("span", "aix-meta-date", "");
    dateSpan.appendChild(dot);
    dateSpan.appendChild(document.createTextNode(selected.dateLabel));
    meta.appendChild(dateSpan);
    detailCard.appendChild(meta);

    paragraphs = selected.description.split(/\n\s*\n/).map(function (p) { return p.trim(); }).filter(Boolean);
    paragraphs.forEach(function (paragraph) {
      detailCard.appendChild(textEl("p", "aix-para", paragraph));
    });

    if (selected.bio) {
      var bio = document.createElement("div");
      bio.className = "aix-bio";
      bio.appendChild(textEl("p", "aix-bio-heading", "About " + selected.speaker));
      bio.appendChild(textEl("p", "aix-bio-text", selected.bio));
      detailCard.appendChild(bio);
    }

    listView.hidden = true;
    detailView.hidden = false;
    window.scrollTo(0, 0);
  }

  function loadEvents() {
    var config = getConfig();
    var urls = [config.csvUrl, config.fallbackCsvUrl].filter(function (url, index, arr) {
      return !!url && arr.indexOf(url) === index;
    });

    statusEl.hidden = false;
    statusEl.textContent = "Loading events\u2026";
    listEl.hidden = true;

    function tryNext(index) {
      if (index >= urls.length) {
        events = [];
        renderList();
        return;
      }

      fetchText(urls[index])
        .then(function (text) {
          events = parseEvents(maybeDecodeBase64(text), config.year);
          renderList();
        })
        .catch(function () {
          tryNext(index + 1);
        });
    }

    tryNext(0);
  }

  backButton.addEventListener("click", showList);
  loadEvents();
})();
</script>
</body>
</html>
