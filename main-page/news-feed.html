<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>USF Feed Grid</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #111;
            background: #fff;
        }

        #feed-grid-root {
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .widget {
            width: 100%;
        }

        .widget_content {
            width: 100%;
        }

        .widget_imageGridItemWrapper {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            column-gap: 1rem;
            row-gap: 1.5rem;
            align-items: start;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0;
        }

        .widget_imageGridItem {
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 0.75rem;
            min-width: 0;
            width: 100%;
            align-content: start;
        }

        .widget_imageGridItem>a {
            color: inherit;
            text-decoration: none;
        }

        .widget_titleLink {
            display: block;
            color: inherit;
            text-decoration: none;
        }

        .widget_titleWrap {
            min-height: 3.3rem;
            max-height: 3.3rem;
            display: flex;
            align-items: flex-start;
            overflow: hidden;
        }

        .widget_textTitle {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.05;
            font-weight: 700;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .widget_featureImageLink {
            display: block;
            width: 100%;
        }

        .widget_featureImageFrame {
            position: relative;
            width: 100%;
            aspect-ratio: 320 / 213;
            overflow: hidden;
            background: #f2f2f2;
        }

        .widget_featureImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            margin: 0;
            border: 0;
        }

        .widget_featureText {
            margin: 0;
            line-height: 1.5;
            font-size: 1rem;
        }

        .feed-grid-error {
            padding: 1rem;
            border: 1px solid #ccc;
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .widget_imageGridItemWrapper {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                max-width: 760px;
            }
        }

        @media (max-width: 640px) {
            .widget_imageGridItemWrapper {
                grid-template-columns: 1fr;
                max-width: 420px;
            }

            .widget_titleWrap {
                min-height: auto;
                max-height: none;
            }

            .widget_textTitle {
                -webkit-line-clamp: unset;
            }
        }
    </style>
</head>

<body>
    <div id="feed-grid-root">
        <div class="widget widget--3">
            <div class="widget_content widget_imageGrid">
                <div class="widget_imageGridItemWrapper" id="feed-grid-items"></div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            const FEED_URL =
                "https://www.usf.edu/news/rss.ashx?dir=/ai-cybersecurity-computing/news/&limit=12&tags=News%20AI%20College%20Category,News%20AI%20College%20Category:%20Artificial%20Intelligence,News%20AI%20College%20Category:%20Computing,News%20AI%20College%20Category:%20Cyberherd,News%20AI%20College%20Category:%20Cybersecurity,News%20AI%20College%20Category:%20Research";

            const MAX_ITEMS = 3;

            const ALLOWED_LINK_HOSTS = new Set([
                "www.usf.edu",
                "usf.edu"
            ]);

            const ALLOWED_IMAGE_HOSTS = new Set([
                "www.usf.edu",
                "usf.edu"
            ]);

            const DATA_URI_FALLBACK_IMAGE =
                "data:image/svg+xml;charset=UTF-8," +
                encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="213" viewBox="0 0 320 213">' +
                    '<rect width="320" height="213" fill="#f2f2f2"/>' +
                    '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#666" font-family="Arial" font-size="18">No Image</text>' +
                    "</svg>"
                );

            const container = document.getElementById("feed-grid-items");

            function decodeXmlEntities(str) {
                if (!str) return "";
                return str
                    .replace(/&lt;/g, "<")
                    .replace(/&gt;/g, ">")
                    .replace(/&quot;/g, '"')
                    .replace(/&#39;/g, "'")
                    .replace(/&apos;/g, "'")
                    .replace(/&amp;/g, "&");
            }

            function stripHtmlToText(html) {
                if (!html) return "";
                const withoutTags = html.replace(/<[^>]*>/g, " ");
                return decodeXmlEntities(withoutTags).replace(/\s+/g, " ").trim();
            }

            function truncate(text, maxLen) {
                if (!text || text.length <= maxLen) return text || "";
                return text.slice(0, maxLen).trimEnd() + "...";
            }

            function safeUrl(rawUrl, fallback = "#", allowedHosts = null) {
                if (!rawUrl) return fallback;

                try {
                    const url = new URL(rawUrl, window.location.href);
                    const allowedProtocol = url.protocol === "http:" || url.protocol === "https:";

                    if (!allowedProtocol) {
                        return fallback;
                    }

                    if (allowedHosts && !allowedHosts.has(url.hostname)) {
                        return fallback;
                    }

                    return url.href;
                } catch (error) {
                    return fallback;
                }
            }

            function safeLinkUrl(rawUrl, fallback = "#") {
                return safeUrl(rawUrl, fallback, ALLOWED_LINK_HOSTS);
            }

            function safeImageUrl(rawUrl, fallback = DATA_URI_FALLBACK_IMAGE) {
                return safeUrl(rawUrl, fallback, ALLOWED_IMAGE_HOSTS);
            }

            function firstText(node, selectors) {
                for (const selector of selectors) {
                    const found = node.querySelector(selector);
                    if (found && found.textContent) {
                        return found.textContent.trim();
                    }
                }
                return "";
            }

            function firstAttr(node, selectors, attrName) {
                for (const selector of selectors) {
                    const found = node.querySelector(selector);
                    if (found) {
                        const value = found.getAttribute(attrName);
                        if (value) return value.trim();
                    }
                }
                return "";
            }

            function extractImageFromDescription(descriptionHtml) {
                if (!descriptionHtml) return "";
                const imgMatch = descriptionHtml.match(/<img\b[^>]*\bsrc=["']([^"']+)["'][^>]*>/i);
                if (!imgMatch || !imgMatch[1]) return "";
                return safeImageUrl(decodeXmlEntities(imgMatch[1]), "");
            }

            function extractImageUrl(item) {
                const enclosureUrl = firstAttr(item, ["enclosure[type^='image/']"], "url");
                if (enclosureUrl) return safeImageUrl(enclosureUrl, "");

                const mediaContentUrl =
                    firstAttr(item, ["media\\:content"], "url") ||
                    firstAttr(item, ["content"], "url");
                if (mediaContentUrl) return safeImageUrl(mediaContentUrl, "");

                const mediaThumbUrl =
                    firstAttr(item, ["media\\:thumbnail"], "url") ||
                    firstAttr(item, ["thumbnail"], "url");
                if (mediaThumbUrl) return safeImageUrl(mediaThumbUrl, "");

                const descriptionHtml =
                    firstText(item, ["description"]) ||
                    firstText(item, ["content\\:encoded", "encoded"]) ||
                    "";

                const descriptionImage = extractImageFromDescription(descriptionHtml);
                if (descriptionImage) return descriptionImage;

                return DATA_URI_FALLBACK_IMAGE;
            }

            function buildCard(item) {
                const rawTitle = firstText(item, ["title"]);
                const rawLink = firstText(item, ["link"]);
                const rawDescription =
                    firstText(item, ["description"]) ||
                    firstText(item, ["content\\:encoded", "encoded"]) ||
                    "";

                const title = decodeXmlEntities(rawTitle) || "Untitled";
                const link = safeLinkUrl(rawLink, "#");
                const blurb = truncate(stripHtmlToText(rawDescription), 150);
                const imageUrl = extractImageUrl(item);

                const card = document.createElement("div");
                card.className = "widget_imageGridItem";

                const titleLink = document.createElement("a");
                titleLink.className = "widget_titleLink";
                titleLink.href = link;
                titleLink.target = "_blank";
                titleLink.rel = "noopener noreferrer";

                const titleWrap = document.createElement("div");
                titleWrap.className = "widget_titleWrap";

                const heading = document.createElement("h2");
                heading.className = "widget_textTitle";
                heading.textContent = title;

                titleWrap.appendChild(heading);
                titleLink.appendChild(titleWrap);

                const imageLink = document.createElement("a");
                imageLink.className = "widget_featureImageLink";
                imageLink.href = link;
                imageLink.target = "_blank";
                imageLink.rel = "noopener noreferrer";

                const imageFrame = document.createElement("div");
                imageFrame.className = "widget_featureImageFrame";

                const image = document.createElement("img");
                image.className = "widget_featureImage";
                image.src = safeImageUrl(imageUrl, DATA_URI_FALLBACK_IMAGE);
                image.alt = title;
                image.loading = "lazy";
                image.referrerPolicy = "no-referrer";

                image.onerror = function () {
                    if (image.src !== DATA_URI_FALLBACK_IMAGE) {
                        image.src = DATA_URI_FALLBACK_IMAGE;
                    }
                };

                imageFrame.appendChild(image);
                imageLink.appendChild(imageFrame);

                const p = document.createElement("p");
                p.className = "widget_featureText";
                p.textContent = blurb;

                card.appendChild(titleLink);
                card.appendChild(imageLink);
                card.appendChild(p);

                return card;
            }

            function renderError(message) {
                const root = document.getElementById("feed-grid-root");
                root.textContent = "";

                const box = document.createElement("div");
                box.className = "feed-grid-error";
                box.textContent = message;

                root.appendChild(box);
            }

            async function loadFeed() {
                try {
                    const response = await fetch(FEED_URL, {
                        method: "GET",
                        mode: "cors",
                        cache: "no-store",
                        credentials: "omit",
                        redirect: "follow"
                    });

                    if (!response.ok) {
                        const body = await response.text();
                        throw new Error("Feed request failed: HTTP " + response.status + " | " + body.slice(0, 500));
                    }

                    const xmlText = await response.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(xmlText, "application/xml");

                    const parserError = xml.querySelector("parsererror");
                    if (parserError) {
                        throw new Error("RSS XML could not be parsed.");
                    }

                    const items = Array.from(xml.querySelectorAll("rss > channel > item")).slice(0, MAX_ITEMS);

                    if (!items.length) {
                        throw new Error("No feed items were found.");
                    }

                    container.textContent = "";
                    for (const item of items) {
                        container.appendChild(buildCard(item));
                    }
                } catch (error) {
                    console.error(error);
                    renderError(String(error.message || error));
                }
            }

            loadFeed();
        })();
    </script>
</body>

</html>
