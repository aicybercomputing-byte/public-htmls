<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview</title>
  <style>
    :root { --green: #006747; --line: #d8d6cd; --bg: #f0eee9; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); font: 15px/1.4 system-ui, sans-serif; color: #2b2b2b; }
    header {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--line);
    }
    header a { color: var(--green); text-decoration: none; font-weight: 600; }
    header a:hover { text-decoration: underline; }
    .path { font-family: ui-monospace, Consolas, monospace; font-size: 0.9rem; color: #666; word-break: break-all; }
    .error { padding: 20px; color: #9a3b2e; }
    iframe { display: block; width: 100%; min-height: calc(100vh - 56px); border: 0; background: #fff; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Asset index</a>
    <span class="path" id="path"></span>
  </header>
  <iframe id="frame" title="Page preview"></iframe>
  <p class="error" id="error" hidden></p>
  <script src="preview.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const filePath = AssetPreview.normalizePreviewPath(params.get("f"));
      const pathEl = document.getElementById("path");
      const frame = document.getElementById("frame");
      const errorEl = document.getElementById("error");

      if (!filePath) {
        pathEl.textContent = "Missing or invalid ?f= parameter";
        errorEl.hidden = false;
        errorEl.textContent = "Use preview.html?f=tcap/faq.pcf";
        frame.hidden = true;
        return;
      }

      pathEl.textContent = filePath;
      document.title = filePath + " — Preview";

      try {
        await AssetPreview.loadIntoIframe(frame, filePath);
      } catch (error) {
        frame.hidden = true;
        errorEl.hidden = false;
        errorEl.textContent = error.message;
      }
    })();
  </script>
</body>
</html>
